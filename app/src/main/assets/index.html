        <script>
            ;(function () {
                'use strict'
                // ---------- DOM ----------
                const scene = document.getElementById('scene')
                const bgCanvas = document.getElementById('bgCanvas')
                const drawCanvas = document.getElementById('drawCanvas')
                const itemsLayer = document.getElementById('itemsLayer')
                const ctx = drawCanvas.getContext('2d')
                const bgCtx = bgCanvas.getContext('2d')
                const cursorDiv = document.getElementById('customCursor')

                // 背景：默认奶油白；其余为 public/background 下的图
                const bgColors = {
                    cream: { type: 'color', value: '#FFF8F0', name: '奶油白' },
                    bg1: {
                        type: 'image',
                        value: './public/background/背景1.webp',
                        name: '背景1',
                    },
                    bg2: {
                        type: 'image',
                        value: './public/background/背景2.webp',
                        name: '背景2',
                    },
                    bg3: {
                        type: 'image',
                        value: './public/background/背景3.webp',
                        name: '背景3',
                    },
                    pic4: {
                        type: 'image',
                        value: './public/background/图片4.webp',
                        name: '图片4',
                    },
                }
                let currentBg = 'cream'

                // 状态
                let currentSelected = null
                let drawingEnabled = false
                let eraserEnabled = false
                let isDrawing = false
                let isDrawingFromTouch = false
                let brushSize = 6
                let eraserSize = 20
                let brushColor = '#000000' // 修复Bug: 添加画笔颜色状态变量
                let sceneHistory = [] // 撤销历史记录（保存完整场景）
                const maxHistorySize = 20 // 最多保存20步历史
                const SCALE_MAX = 40.0
                const SCALE_MIN = 0.2
                /** 素材栏缩略图占位，避免折叠时加载全部 webp 导致点击分类卡顿 */
                const THUMB_PLACEHOLDER =
                    'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'

                // 光标 RAF
                let cursorX = 0,
                    cursorY = 0
                let rafPending = false
                function updateCursorNow() {
                    cursorDiv.style.left = cursorX + 'px'
                    cursorDiv.style.top = cursorY + 'px'
                    rafPending = false
                }
                function setCursorPos(x, y) {
                    cursorX = x
                    cursorY = y
                    if (!rafPending) {
                        rafPending = true
                        requestAnimationFrame(updateCursorNow)
                    }
                }

                // ========== 初始化 ==========
                function onAppReady() {
                    preloadBgImages()
                    renderItemsPanel()
                    setBackground('cream')
                    resizeCanvas()
                    bindUI()
                }
                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', onAppReady)
                } else {
                    onAppReady()
                }

                // 绘制背景 - 手绘纸张效果
                const bgImageCache = {}

                function drawBackground() {
                    const dpr = window.devicePixelRatio || 1
                    const w = bgCanvas.width / dpr
                    const h = bgCanvas.height / dpr
                    if (w <= 0 || h <= 0) return

                    const bg = bgColors[currentBg]
                    if (!bg) {
                        currentBg = 'cream'
                        return drawBackground()
                    }
                    if (bg.type === 'image') {
                        const cached = bgImageCache[currentBg]
                        if (cached) {
                            const img = cached
                            const iw = img.naturalWidth || img.width || 1
                            const ih = img.naturalHeight || img.height || 1
                            // cover：宽高都铺满画布（等比缩放，超出由画布裁切）
                            const scale = Math.max(w / iw, h / ih)
                            const imgW = iw * scale
                            const imgH = ih * scale
                            const x = (w - imgW) / 2
                            const y = (h - imgH) / 2
                            bgCtx.drawImage(img, 0, 0, iw, ih, x, y, imgW, imgH)
                        } else {
                            bgCtx.fillStyle = '#87CEEB'
                            bgCtx.fillRect(0, 0, w, h)
                        }
                        return
                    }

                    // 颜色背景
                    bgCtx.fillStyle = bg.value
                    bgCtx.fillRect(0, 0, w, h)

                    // 纹理与网格在设备像素位图上处理，避免与 scale(dpr) 错位
                    bgCtx.save()
                    bgCtx.setTransform(1, 0, 0, 1, 0, 0)
                    const bw = bgCanvas.width
                    const bh = bgCanvas.height
                    const imageData = bgCtx.getImageData(0, 0, bw, bh)
                    const data = imageData.data
                    for (let i = 0; i < data.length; i += 4) {
                        const noise = (Math.random() - 0.5) * 15
                        data[i] = Math.max(0, Math.min(255, data[i] + noise))
                        data[i + 1] = Math.max(
                            0,
                            Math.min(255, data[i + 1] + noise)
                        )
                        data[i + 2] = Math.max(
                            0,
                            Math.min(255, data[i + 2] + noise)
                        )
                    }
                    bgCtx.putImageData(imageData, 0, 0)
                    bgCtx.restore()

                    bgCtx.strokeStyle = 'rgba(180, 160, 140, 0.15)'
                    bgCtx.lineWidth = 0.5

                    for (let y = 40; y < h; y += 40) {
                        bgCtx.beginPath()
                        let x = 0
                        bgCtx.moveTo(x, y + (Math.random() - 0.5) * 2)
                        while (x < w) {
                            x += 20
                            bgCtx.lineTo(x, y + (Math.random() - 0.5) * 2)
                        }
                        bgCtx.stroke()
                    }

                    for (let x = 40; x < w; x += 40) {
                        bgCtx.beginPath()
                        let y = 0
                        bgCtx.moveTo(x + (Math.random() - 0.5) * 2, y)
                        while (y < h) {
                            y += 20
                            bgCtx.lineTo(x + (Math.random() - 0.5) * 2, y)
                        }
                        bgCtx.stroke()
                    }

                    const gradient = bgCtx.createRadialGradient(
                        w / 2,
                        h / 2,
                        0,
                        w / 2,
                        h / 2,
                        Math.max(w, h) * 0.7
                    )
                    gradient.addColorStop(0, 'rgba(0,0,0,0)')
                    gradient.addColorStop(1, 'rgba(0,0,0,0.08)')
                    bgCtx.fillStyle = gradient
                    bgCtx.fillRect(0, 0, w, h)
                }

                // 预加载背景图片
                function preloadBgImages() {
                    for (const [key, bg] of Object.entries(bgColors)) {
                        if (bg.type === 'image') {
                            const img = new Image()
                            img.onload = () => {
                                bgImageCache[key] = img
                            }
                            img.src = bg.value
                        }
                    }
                }

                // 切换背景
                function setBackground(bgKey) {
                    if (!bgColors[bgKey]) return
                    currentBg = bgKey
                    drawBackground()
                    document
                        .querySelectorAll(
                            '.sidebar-bg-category .mat-btn[data-bg]'
                        )
                        .forEach((btn) => {
                            btn.classList.toggle(
                                'active',
                                btn.dataset.bg === bgKey
                            )
                        })
                }

                /** 场景内容区 CSS 尺寸：与绝对定位子节点、笔迹命中一致（不含 #scene 边框） */
                function getSceneLayoutCssSize() {
                    return {
                        w: Math.max(1, Math.round(scene.clientWidth)),
                        h: Math.max(1, Math.round(scene.clientHeight)),
                    }
                }

                function resizeCanvas() {
                    const { w: cssWidth, h: cssHeight } =
                        getSceneLayoutCssSize()

                    // 高清屏 DPR
                    const dpr = window.devicePixelRatio || 1

                    // 保存原画布内容
                    let drawImageData = null

                    if (drawCanvas.width > 0 && drawCanvas.height > 0) {
                        try {
                            drawImageData = drawCanvas.toDataURL('image/png')
                        } catch (e) {
                            console.log('保存画布内容失败:', e)
                        }
                    }

                    // 设置 CSS 尺寸
                    bgCanvas.style.width = cssWidth + 'px'
                    bgCanvas.style.height = cssHeight + 'px'

                    drawCanvas.style.width = cssWidth + 'px'
                    drawCanvas.style.height = cssHeight + 'px'

                    // 设置真实像素尺寸
                    bgCanvas.width = Math.round(cssWidth * dpr)
                    bgCanvas.height = Math.round(cssHeight * dpr)

                    drawCanvas.width = Math.round(cssWidth * dpr)
                    drawCanvas.height = Math.round(cssHeight * dpr)

                    // 重置 transform
                    bgCtx.setTransform(1, 0, 0, 1, 0, 0)
                    ctx.setTransform(1, 0, 0, 1, 0, 0)

                    // DPR 缩放
                    bgCtx.scale(dpr, dpr)
                    ctx.scale(dpr, dpr)

                    drawBackground()

                    // 恢复绘画内容
                    if (drawImageData) {
                        const img = new Image()

                        img.onload = () => {
                            ctx.drawImage(img, 0, 0, cssWidth, cssHeight)
                        }

                        img.src = drawImageData
                    }
                }

                let resizeTimer
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimer)
                    resizeTimer = setTimeout(() => {
                        resizeCanvas()
                        clampAllItems()
                    }, 100)
                })

                function clampAllItems() {
                    document.querySelectorAll('.draggable').forEach((el) => {
                        const { tx, ty, scale, rotate } = getTransform(el)
                        const pos = clampPosition(el, tx, ty)
                        setTransform(el, pos.x, pos.y, scale, rotate)
                    })
                }

                // ========== 单物品锁定（dataset，非全局锁定）==========
                function isLocked(el) {
                    return el.dataset.locked === 'true'
                }
                function setLocked(el, locked) {
                    el.dataset.locked = locked
                    if (locked) el.classList.add('locked-by-mode')
                    else el.classList.remove('locked-by-mode')
                }

                function setItemsLockedForMode(lock) {
                    document.querySelectorAll('.draggable').forEach((el) => {
                        if (!isLocked(el))
                            el.classList.toggle('mode-locked', lock)
                    })
                }
                function updateInteractionLock() {
                    setItemsLockedForMode(drawingEnabled || eraserEnabled)
                }

                function getTransform(el) {
                    if (el._tx === undefined) {
                        el._tx = 0
                        el._ty = 0
                        el._scale = 1.0
                        el._rotate = 0
                    }
                    return {
                        tx: el._tx,
                        ty: el._ty,
                        scale: el._scale,
                        rotate: el._rotate,
                    }
                }
                // 缓存场景边界，减少DOM访问
                let sceneBounds = null
                let lastBoundsUpdate = 0

                function setTransform(el, tx, ty, scale, rotate) {
                    // 只在值变化时更新，减少重绘
                    if (
                        el._tx !== tx ||
                        el._ty !== ty ||
                        el._scale !== scale ||
                        el._rotate !== rotate
                    ) {
                        el._tx = tx
                        el._ty = ty
                        el._scale = scale
                        el._rotate = rotate
                        el.style.transform = `translate(${Math.round(
                            tx
                        )}px, ${Math.round(
                            ty
                        )}px) scale(${scale}) rotate(${rotate}deg)`
                    }
                }
                function clampPosition(el, tx, ty) {
                    const now = Date.now()
                    // 每100ms更新一次边界缓存
                    if (now - lastBoundsUpdate > 100) {
                        const s = getSceneLayoutCssSize()
                        sceneBounds = { width: s.w, height: s.h }
                        lastBoundsUpdate = now
                    }
                    const w = el.offsetWidth,
                        h = el.offsetHeight
                    return {
                        x: Math.min(
                            sceneBounds.width - w * 0.3,
                            Math.max(-w * 0.7, tx)
                        ),
                        y: Math.min(
                            sceneBounds.height - h * 0.3,
                            Math.max(-h * 0.7, ty)
                        ),
                    }
                }

                /** 儿童贴图显示：取长边为基准放大，避免固定 70×100 过小发糊 */
                const KID_DISPLAY_MAX_EDGE = 240
                function applyKidDisplaySize(div, img) {
                    const nw = img.naturalWidth
                    const nh = img.naturalHeight
                    if (nw <= 0 || nh <= 0) {
                        div.style.width = '160px'
                        div.style.height = '200px'
                        return
                    }
                    let w, h
                    if (nw >= nh) {
                        w = KID_DISPLAY_MAX_EDGE
                        h = Math.max(
                            1,
                            Math.round((KID_DISPLAY_MAX_EDGE * nh) / nw)
                        )
                    } else {
                        h = KID_DISPLAY_MAX_EDGE
                        w = Math.max(
                            1,
                            Math.round((KID_DISPLAY_MAX_EDGE * nw) / nh)
                        )
                    }
                    div.style.width = w + 'px'
                    div.style.height = h + 'px'
                }

                // ========== 创建物品 ==========
                function createDraggable(
                    type,
                    imgUrl,
                    saveState = true,
                    onCreated = null
                ) {
                    const div = document.createElement('div')
                    div.className = 'draggable'
                    div.setAttribute('data-type', type)

                    // 添加加载占位符
                    const spinner = document.createElement('div')
                    spinner.className = 'img-spinner'
                    div.appendChild(spinner)

                    const img = document.createElement('img')
                    img.crossOrigin = 'anonymous'
                    img.src = imgUrl
                    img.alt = type
                    img.draggable = false
                    img.style.opacity = '0'
                    img.style.transition = 'opacity 0.3s'
                    div.appendChild(img)

                    div.style.position = 'absolute'
                    itemsLayer.appendChild(div)

                    // 图片加载完成后，根据原始尺寸自适应容器大小（统一500x500）
                    function adjustSize() {
                        spinner.style.display = 'none'
                        img.style.opacity = '1'
                        if (type === 'kid') {
                            applyKidDisplaySize(div, img)
                            requestAnimationFrame(() => {
                                const { w: sw, h: sh } = getSceneLayoutCssSize()
                                const centerX = (sw - div.offsetWidth) / 2
                                const centerY = (sh - div.offsetHeight) / 2
                                const pos = clampPosition(div, centerX, centerY)
                                setTransform(div, pos.x, pos.y, 1.0, 0)
                            })
                            return
                        }
                        const nw = img.naturalWidth
                        const nh = img.naturalHeight
                        if (nw > 0 && nh > 0) {
                            const targetSize = 300
                            div.style.width = targetSize + 'px'
                            div.style.height = targetSize + 'px'
                        }
                        requestAnimationFrame(() => {
                            const { w: sw, h: sh } = getSceneLayoutCssSize()
                            const centerX = (sw - div.offsetWidth) / 2
                            const centerY = (sh - div.offsetHeight) / 2
                            const pos = clampPosition(div, centerX, centerY)
                            setTransform(div, pos.x, pos.y, 1.0, 0)
                        })
                    }
                    if (img.complete && img.naturalWidth > 0) {
                        adjustSize()
                    } else {
                        img.onload = adjustSize
                        img.onerror = adjustSize
                    }

                    const { w: sw, h: sh } = getSceneLayoutCssSize()
                    const centerX = (sw - div.offsetWidth) / 2
                    const centerY = (sh - div.offsetHeight) / 2
                    const pos = clampPosition(div, centerX, centerY)
                    setTransform(div, pos.x, pos.y, 1.0, 0)

                    // 如果是新增物品（需要保存状态），保存场景
                    if (saveState) {
                        saveSceneState()
                    }

                    // 调用创建完成回调
                    if (onCreated) {
                        onCreated(div)
                    }

                    return div
                }

                /** 人物 z 在 [Z_KID_MIN, Z_KID_MAX]；其它物体在 [Z_OTHER_MIN, Z_KID_MIN)，最后选中的在同层最上 */
                const Z_OTHER_MIN = 10
                const Z_KID_MIN = 10000
                const Z_KID_MAX = 49999

                function isKidItem(el) {
                    return (
                        el &&
                        el.getAttribute &&
                        el.getAttribute('data-type') === 'kid'
                    )
                }

                function bumpItemZOrder(el) {
                    if (!el || !itemsLayer.contains(el)) return
                    if (isKidItem(el)) {
                        let maxZ = Z_KID_MIN - 1
                        itemsLayer
                            .querySelectorAll('.draggable[data-type="kid"]')
                            .forEach((n) => {
                                let z = parseInt(n.style.zIndex, 10)
                                if (!Number.isFinite(z) || z < Z_KID_MIN)
                                    z = Z_KID_MIN - 1
                                maxZ = Math.max(maxZ, z)
                            })
                        el.style.zIndex = String(Math.min(maxZ + 1, Z_KID_MAX))
                    } else {
                        let maxZ = Z_OTHER_MIN - 1
                        itemsLayer
                            .querySelectorAll(
                                '.draggable:not([data-type="kid"])'
                            )
                            .forEach((n) => {
                                let z = parseInt(n.style.zIndex, 10)
                                if (!Number.isFinite(z)) z = 5
                                if (z >= Z_KID_MIN) z = Z_KID_MIN - 1
                                maxZ = Math.max(maxZ, z)
                            })
                        el.style.zIndex = String(
                            Math.min(
                                Math.max(maxZ + 1, Z_OTHER_MIN),
                                Z_KID_MIN - 1
                            )
                        )
                    }
                }

                // ========== 移动端物品拖拽系统（事件委托） ==========
                let activeDrag = null
                let dragStartX = 0,
                    dragStartY = 0
                let dragStartTx = 0,
                    dragStartTy = 0
                let dragStartScale = 1,
                    dragStartRotate = 0
                let activePinch = null
                let pinchStartDistance = 0,
                    pinchStartScale = 1
                let pinchStartAngle = 0,
                    pinchStartRotate = 0
                let pinchStartTx = 0,
                    pinchStartTy = 0
                let pinchCenterX = 0,
                    pinchCenterY = 0

                function getItemAtPoint(x, y) {
                    const elements = document.elementsFromPoint(x, y)
                    for (const el of elements) {
                        if (
                            el.classList &&
                            el.classList.contains('draggable')
                        ) {
                            return el
                        }
                    }
                    return null
                }

                function getDistance(t1, t2) {
                    return Math.hypot(
                        t2.clientX - t1.clientX,
                        t2.clientY - t1.clientY
                    )
                }

                function getAngle(t1, t2) {
                    return (
                        (Math.atan2(
                            t2.clientY - t1.clientY,
                            t2.clientX - t1.clientX
                        ) *
                            180) /
                        Math.PI
                    )
                }

                function getTouchCenter(touches) {
                    let x = 0,
                        y = 0
                    for (let i = 0; i < touches.length; i++) {
                        x += touches[i].clientX
                        y += touches[i].clientY
                    }
                    return { x: x / touches.length, y: y / touches.length }
                }

                // 触摸开始
                function onTouchStart(e) {
                    const touches = e.touches

                    // 绘画模式下不处理物品拖拽，让 drawCanvas 处理绘画
                    if (drawingEnabled || eraserEnabled) return

                    if (touches.length === 1) {
                        // 单指触摸
                        const el = getItemAtPoint(
                            touches[0].clientX,
                            touches[0].clientY
                        )
                        if (el) {
                            if (isLocked(el)) {
                                selectElement(el)
                                return
                            }
                            activeDrag = el
                            const { tx, ty, scale, rotate } = getTransform(el)
                            dragStartX = touches[0].clientX
                            dragStartY = touches[0].clientY
                            dragStartTx = tx
                            dragStartTy = ty
                            dragStartScale = scale
                            dragStartRotate = rotate
                            selectElement(el)
                            e.preventDefault()
                        }
                    } else if (touches.length === 2) {
                        // 双指触摸 - 缩放和旋转
                        let el = activeDrag
                        if (!el) {
                            // 检查两个手指的位置，找到物品
                            el =
                                getItemAtPoint(
                                    touches[0].clientX,
                                    touches[0].clientY
                                ) ||
                                getItemAtPoint(
                                    touches[1].clientX,
                                    touches[1].clientY
                                )
                        }
                        if (el && !isLocked(el)) {
                            activePinch = el
                            const center = getTouchCenter([
                                touches[0],
                                touches[1],
                            ])
                            pinchCenterX = center.x
                            pinchCenterY = center.y
                            pinchStartDistance = getDistance(
                                touches[0],
                                touches[1]
                            )
                            pinchStartAngle = getAngle(touches[0], touches[1])
                            const { tx, ty, scale, rotate } = getTransform(el)
                            pinchStartScale = scale
                            pinchStartRotate = rotate
                            pinchStartTx = tx
                            pinchStartTy = ty
                            selectElement(el)
                            e.preventDefault()
                        }
                    }
                }

                // 触摸移动
                function onTouchMove(e) {
                    const touches = e.touches

                    if (activePinch && touches.length >= 2) {
                        // 双指缩放旋转
                        if (isLocked(activePinch)) return

                        const center = getTouchCenter([touches[0], touches[1]])
                        const curDistance = getDistance(touches[0], touches[1])
                        const curAngle = getAngle(touches[0], touches[1])

                        const scaleFactor = curDistance / pinchStartDistance
                        let newScale = pinchStartScale * scaleFactor
                        newScale = Math.min(
                            SCALE_MAX,
                            Math.max(SCALE_MIN, newScale)
                        )

                        let angleDiff = curAngle - pinchStartAngle
                        while (angleDiff > 180) angleDiff -= 360
                        while (angleDiff < -180) angleDiff += 360
                        let newRotate = pinchStartRotate + angleDiff

                        // 移动位置
                        const dx = center.x - pinchCenterX
                        const dy = center.y - pinchCenterY
                        let newTx = pinchStartTx + dx
                        let newTy = pinchStartTy + dy

                        const pos = clampPosition(activePinch, newTx, newTy)
                        setTransform(
                            activePinch,
                            pos.x,
                            pos.y,
                            newScale,
                            newRotate
                        )

                        e.preventDefault()
                    } else if (activeDrag && touches.length === 1) {
                        // 单指拖拽
                        if (isLocked(activeDrag)) return

                        const dx = touches[0].clientX - dragStartX
                        const dy = touches[0].clientY - dragStartY
                        let newTx = dragStartTx + dx
                        let newTy = dragStartTy + dy
                        const pos = clampPosition(activeDrag, newTx, newTy)
                        setTransform(
                            activeDrag,
                            pos.x,
                            pos.y,
                            dragStartScale,
                            dragStartRotate
                        )
                        e.preventDefault()
                    }
                }

                // 触摸结束
                function onTouchEnd(e) {
                    const touches = e.touches
                    // 触摸结束时保存场景状态（如果有过操作）
                    if (activeDrag || activePinch) {
                        saveSceneState()
                    }
                    if (touches.length === 0) {
                        activeDrag = null
                        activePinch = null
                    } else if (touches.length === 1 && activePinch) {
                        // 双指 → 单指：必须先对齐单指拖拽基准，否则会沿用 pinch 前的
                        // dragStartScale / dragStartRotate，下一帧 touchmove 把缩放“弹回去”
                        const el = activePinch
                        activePinch = null
                        const t = touches[0]
                        const cur = getTransform(el)
                        if (activeDrag === el) {
                            dragStartX = t.clientX
                            dragStartY = t.clientY
                            dragStartTx = cur.tx
                            dragStartTy = cur.ty
                            dragStartScale = cur.scale
                            dragStartRotate = cur.rotate
                        }
                    } else if (touches.length === 1) {
                        activePinch = null
                    }
                }

                // 绑定触摸事件到 scene
                scene.addEventListener('touchstart', onTouchStart, {
                    passive: false,
                })
                scene.addEventListener('touchmove', onTouchMove, {
                    passive: false,
                })
                scene.addEventListener('touchend', onTouchEnd)
                scene.addEventListener('touchcancel', onTouchEnd)

                // ========== 桌面端鼠标拖拽 ==========
                let mouseDragTarget = null
                let mouseStartX = 0,
                    mouseStartY = 0
                let mouseStartTx = 0,
                    mouseStartTy = 0
                let mouseStartScale = 1,
                    mouseStartRotate = 0

                scene.addEventListener('mousedown', function (e) {
                    const el = getItemAtPoint(e.clientX, e.clientY)
                    // 只有点击物品时才取消绘画模式，点击空白处保持绘画
                    if (el) {
                        if (drawingEnabled || eraserEnabled) {
                            disableAllModes()
                            selectElement(el)
                            return
                        }
                        if (isLocked(el)) {
                            selectElement(el)
                            return
                        }
                        mouseDragTarget = el
                        const { tx, ty, scale, rotate } = getTransform(el)
                        mouseStartX = e.clientX
                        mouseStartY = e.clientY
                        mouseStartTx = tx
                        mouseStartTy = ty
                        mouseStartScale = scale
                        mouseStartRotate = rotate
                        selectElement(el)
                    }
                })

                document.addEventListener('mousemove', function (e) {
                    if (mouseDragTarget) {
                        if (isLocked(mouseDragTarget)) return
                        const dx = e.clientX - mouseStartX
                        const dy = e.clientY - mouseStartY
                        let newTx = mouseStartTx + dx
                        let newTy = mouseStartTy + dy
                        const pos = clampPosition(mouseDragTarget, newTx, newTy)
                        setTransform(
                            mouseDragTarget,
                            pos.x,
                            pos.y,
                            mouseStartScale,
                            mouseStartRotate
                        )
                    }
                })

                document.addEventListener('mouseup', function () {
                    if (mouseDragTarget) {
                        // 拖拽结束时保存场景状态
                        saveSceneState()
                    }
                    mouseDragTarget = null
                })

                // 滚轮缩放
                function onWheel(e) {
                    if (!currentSelected) return
                    if (drawingEnabled || eraserEnabled) return
                    if (isLocked(currentSelected)) return

                    e.preventDefault()
                    const delta = e.deltaY > 0 ? 0.9 : 1.1
                    const { tx, ty, scale, rotate } =
                        getTransform(currentSelected)
                    let newScale = scale * delta
                    newScale = Math.min(
                        SCALE_MAX,
                        Math.max(SCALE_MIN, newScale)
                    )
                    setTransform(currentSelected, tx, ty, newScale, rotate)
                }

                scene.addEventListener('wheel', onWheel, { passive: false })

                function selectElement(el) {
                    // 点击画布上的物品时自动取消画笔/橡皮擦模式
                    if (drawingEnabled || eraserEnabled) {
                        disableAllModes()
                    }
                    if (currentSelected)
                        currentSelected.classList.remove('selected')
                    currentSelected = el
                    el.classList.add('selected')
                    bumpItemZOrder(el)
                }
                // 点击物品栏时不取消画笔模式，只选中物品
                function selectElementNoDisable(el) {
                    if (currentSelected)
                        currentSelected.classList.remove('selected')
                    currentSelected = el
                    el.classList.add('selected')
                    bumpItemZOrder(el)
                }
                function clearSelection() {
                    if (currentSelected)
                        currentSelected.classList.remove('selected')
                    currentSelected = null
                }
                function deleteSelected() {
                    if (!currentSelected) return
                    saveSceneState()
                    if (confirm('确定删除选中的物品吗？')) {
                        currentSelected.remove()
                        clearSelection()
                    }
                }
                function clearScene() {
                    if (confirm('确定清空所有物品和绘画吗？')) {
                        itemsLayer.innerHTML = ''
                        clearCanvas()
                        clearSelection()
                    }
                }
                function clearCanvas() {
                    ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height)
                }

                function disableBrushAndEraser() {
                    drawingEnabled = false
                    eraserEnabled = false
                    drawCanvas.classList.remove('drawing-mode')
                    document
                        .getElementById('brushBtn')
                        .classList.remove('active')
                    document
                        .getElementById('eraserBtn')
                        .classList.remove('active')
                    updateInteractionLock()
                    updateCursor()
                }

                function disableAllModes() {
                    clearSelection() // 取消物品选择
                    closeAllDropdowns()
                    disableBrushAndEraser()
                }

                function closeAllDropdowns() {
                    document
                        .querySelectorAll('.brush-dropdown-content')
                        .forEach((el) => el.classList.remove('show'))
                }
                function toggleDrawing() {
                    if (drawingEnabled) {
                        disableAllModes()
                        return
                    }
                    disableAllModes()
                    drawingEnabled = true
                    drawCanvas.classList.add('drawing-mode')
                    document.getElementById('brushBtn').classList.add('active')
                    updateInteractionLock()
                    updateCursor()
                    closeAllDropdowns()
                }
                function updateCursor() {
                    if (drawingEnabled || eraserEnabled) {
                        cursorDiv.style.display = 'block'
                        if (eraserEnabled) {
                            cursorDiv.classList.add('eraser-mode')
                            const s = Math.max(8, Math.min(eraserSize, 64))
                            cursorDiv.style.width = s + 'px'
                            cursorDiv.style.height = s + 'px'
                        } else {
                            cursorDiv.classList.remove('eraser-mode')
                            cursorDiv.style.removeProperty('width')
                            cursorDiv.style.removeProperty('height')
                        }
                    } else {
                        cursorDiv.style.display = 'none'
                        cursorDiv.classList.remove('eraser-mode')
                        cursorDiv.style.removeProperty('width')
                        cursorDiv.style.removeProperty('height')
                    }
                }
                function moveCursor(e) {
                    if (!drawingEnabled && !eraserEnabled) return
                    let cx, cy
                    if (e.touches) {
                        cx = e.touches[0].clientX
                        cy = e.touches[0].clientY
                    } else {
                        cx = e.clientX
                        cy = e.clientY
                    }
                    setCursorPos(cx, cy)
                }
                function getCanvasCoords(e) {
                    const rect = drawCanvas.getBoundingClientRect()

                    const clientX = e.touches ? e.touches[0].clientX : e.clientX

                    const clientY = e.touches ? e.touches[0].clientY : e.clientY

                    return {
                        x: clientX - rect.left,
                        y: clientY - rect.top,
                    }
                }
                // 记录上一个点用于曲线平滑
                let lastX, lastY

                function startDrawing(e) {
                    if (!drawingEnabled && !eraserEnabled) return
                    e.preventDefault()
                    const isTouch = e.touches !== undefined
                    if (isTouch && isDrawingFromTouch) return
                    if (!isTouch && isDrawing) return
                    closeAllDropdowns()
                    saveSceneState()
                    const { x, y } = getCanvasCoords(e)
                    isDrawing = true
                    if (isTouch) isDrawingFromTouch = true
                    lastX = x
                    lastY = y
                    ctx.beginPath()
                    ctx.moveTo(x, y)
                    ctx.lineWidth = eraserEnabled ? eraserSize : brushSize
                    ctx.strokeStyle = brushColor
                    ctx.lineCap = 'round'
                    ctx.lineJoin = 'round'
                    ctx.globalCompositeOperation = eraserEnabled
                        ? 'destination-out'
                        : 'source-over'
                }
                // 使用二次贝塞尔曲线平滑线条
                function draw(e) {
                    if (!isDrawing) return
                    e.preventDefault()
                    const { x, y } = getCanvasCoords(e)
                    const midX = (lastX + x) / 2
                    const midY = (lastY + y) / 2
                    ctx.quadraticCurveTo(lastX, lastY, midX, midY)
                    ctx.stroke()
                    ctx.beginPath()
                    ctx.moveTo(midX, midY)
                    lastX = x
                    lastY = y
                }
                function stopDrawing() {
                    if (!isDrawing && !isDrawingFromTouch) return
                    isDrawing = false
                    isDrawingFromTouch = false
                    ctx.globalCompositeOperation = 'source-over'
                }
                function setBrushSize(size) {
                    brushSize = size
                    const panel = document.getElementById(
                        'brushDropdownContent'
                    )
                    if (!panel) return
                    panel
                        .querySelectorAll('.size-btn')
                        .forEach((btn) =>
                            btn.classList.toggle(
                                'active',
                                parseInt(btn.dataset.size, 10) === size
                            )
                        )
                }
                function setEraserSize(size) {
                    eraserSize = size
                    const panel = document.getElementById(
                        'eraserDropdownContent'
                    )
                    if (!panel) return
                    panel
                        .querySelectorAll('.eraser-size-btn')
                        .forEach((btn) =>
                            btn.classList.toggle(
                                'active',
                                parseInt(btn.dataset.size, 10) === size
                            )
                        )
                    updateCursor()
                }
                function setBrushColor(color) {
                    brushColor = color
                }
                // 保存完整场景状态（物品 + 画布）用于撤销
                function saveSceneState() {
                    // 保存所有物品的信息
                    const items = []
                    document.querySelectorAll('.draggable').forEach((el) => {
                        const img = el.querySelector('img')
                        if (img && img.src) {
                            const { tx, ty, scale, rotate } = getTransform(el)
                            items.push({
                                type: el.dataset.type,
                                imgUrl: img.src,
                                tx: tx,
                                ty: ty,
                                scale: scale,
                                rotate: rotate,
                                zIndex: (() => {
                                    const z = parseInt(el.style.zIndex, 10)
                                    if (Number.isFinite(z)) return String(z)
                                    return isKidItem(el)
                                        ? String(Z_KID_MIN)
                                        : '5'
                                })(),
                            })
                        }
                    })
                    // 保存画布状态
                    const canvasState = drawCanvas.toDataURL('image/png')
                    sceneHistory.push({ items: items, canvas: canvasState })
                    if (sceneHistory.length > maxHistorySize) {
                        sceneHistory.shift()
                    }
                }
                // 撤销上一步
                function undoScene() {
                    if (sceneHistory.length === 0) return

                    const currentState = sceneHistory.pop()

                    // 清空物品层
                    itemsLayer.innerHTML = ''
                    clearCanvas()

                    // 恢复画布
                    if (currentState && currentState.canvas) {
                        const canvasImg = new Image()
                        canvasImg.onload = function () {
                            ctx.drawImage(
                                canvasImg,
                                0,
                                0,
                                drawCanvas.width,
                                drawCanvas.height
                            )
                        }
                        canvasImg.src = currentState.canvas
                    }

                    // 恢复物品
                    if (
                        currentState &&
                        currentState.items &&
                        currentState.items.length > 0
                    ) {
                        currentState.items.forEach((item) => {
                            const div = document.createElement('div')
                            div.className = 'draggable'
                            div.setAttribute('data-type', item.type)

                            const spinner = document.createElement('div')
                            spinner.className = 'img-spinner'
                            div.appendChild(spinner)

                            const img = document.createElement('img')
                            img.crossOrigin = 'anonymous'
                            img.src = item.imgUrl
                            img.alt = item.type
                            img.draggable = false
                            img.style.opacity = '0'
                            img.style.transition = 'opacity 0.3s'
                            div.appendChild(img)

                            div.style.position = 'absolute'
                            itemsLayer.appendChild(div)

                            // 图片加载完成后设置样式和位置
                            img.onload = function () {
                                spinner.style.display = 'none'
                                img.style.opacity = '1'

                                if (item.type === 'kid') {
                                    applyKidDisplaySize(div, img)
                                } else {
                                    const targetSize = 300
                                    div.style.width = targetSize + 'px'
                                    div.style.height = targetSize + 'px'
                                }

                                // 设置位置和变换
                                setTransform(
                                    div,
                                    item.tx,
                                    item.ty,
                                    item.scale,
                                    item.rotate
                                )
                                div.style.zIndex =
                                    item.zIndex != null && item.zIndex !== ''
                                        ? item.zIndex
                                        : item.type === 'kid'
                                        ? String(Z_KID_MIN)
                                        : String(Z_OTHER_MIN)
                            }
                            img.onerror = function () {
                                // 图片加载失败时也尝试恢复位置
                                spinner.style.display = 'none'
                                img.style.opacity = '1'
                                if (item.type === 'kid') {
                                    div.style.width = '160px'
                                    div.style.height = '200px'
                                } else {
                                    const targetSize = 300
                                    div.style.width = targetSize + 'px'
                                    div.style.height = targetSize + 'px'
                                }
                                setTransform(
                                    div,
                                    item.tx,
                                    item.ty,
                                    item.scale,
                                    item.rotate
                                )
                                div.style.zIndex =
                                    item.zIndex != null && item.zIndex !== ''
                                        ? item.zIndex
                                        : item.type === 'kid'
                                        ? String(Z_KID_MIN)
                                        : String(Z_OTHER_MIN)
                            }
                        })
                    }
                }
                /** 与 saveImage / 预览共用：把物品画进与 bgCanvas 同尺寸的位图坐标系 */
                function drawDraggablesToCanvas(ctx) {
                    const list = Array.prototype.slice.call(
                        itemsLayer.querySelectorAll('.draggable')
                    )
                    list.sort(function (a, b) {
                        const za = parseInt(a.style.zIndex, 10)
                        const zb = parseInt(b.style.zIndex, 10)
                        const ea = Number.isFinite(za) ? za : 5
                        const eb = Number.isFinite(zb) ? zb : 5
                        return ea - eb
                    })
                    list.forEach(function (el) {
                        const img = el.querySelector('img')
                        if (!img || !img.complete || img.naturalWidth === 0)
                            return
                        const nw = img.naturalWidth
                        const nh = img.naturalHeight
                        const W = el.offsetWidth
                        const H = el.offsetHeight
                        if (W < 1 || H < 1) return
                        // 与 CSS object-fit: contain 一致，避免把整张图硬拉到 W×H 导致与屏幕尺寸/比例不符
                        const fit = Math.min(W / nw, H / nh)
                        const dw = nw * fit
                        const dh = nh * fit
                        const { tx, ty, scale, rotate } = getTransform(el)
                        const centerX = tx + W / 2
                        const centerY = ty + H / 2
                        ctx.save()
                        ctx.translate(centerX, centerY)
                        // 与 style.transform = translate scale rotate 的矩阵顺序一致：T * S * R
                        ctx.scale(scale, scale)
                        ctx.rotate((rotate * Math.PI) / 180)
                        ctx.drawImage(
                            img,
                            0,
                            0,
                            nw,
                            nh,
                            -dw / 2,
                            -dh / 2,
                            dw,
                            dh
                        )
                        ctx.restore()
                    })
                }

                /** 将场景（背景 + 物品 + 涂鸦）合成到已有尺寸的 2d 上下文。
                 *  @param {CanvasRenderingContext2D} ctx
                 *  @param {number} [targetCssW] 与 getSceneLayoutCssSize() 一致的 CSS 像素宽；不传则与内部位图同尺寸
                 *  @param {number} [targetCssH]
                 */
                function compositeSceneToContext(ctx, targetCssW, targetCssH) {
                    const bufW = bgCanvas.width
                    const bufH = bgCanvas.height
                    if (bufW < 1 || bufH < 1) return
                    const c = ctx.canvas
                    let outW = bufW
                    let outH = bufH
                    if (
                        typeof targetCssW === 'number' &&
                        typeof targetCssH === 'number' &&
                        targetCssW >= 1 &&
                        targetCssH >= 1
                    ) {
                        outW = Math.round(targetCssW)
                        outH = Math.round(targetCssH)
                    }
                    if (c.width !== outW || c.height !== outH) {
                        c.width = outW
                        c.height = outH
                    }
                    ctx.setTransform(1, 0, 0, 1, 0, 0)
                    ctx.imageSmoothingEnabled = true
                    ctx.imageSmoothingQuality = 'high'
                    ctx.drawImage(bgCanvas, 0, 0, bufW, bufH, 0, 0, outW, outH)
                    drawDraggablesToCanvas(ctx)
                    ctx.drawImage(
                        drawCanvas,
                        0,
                        0,
                        bufW,
                        bufH,
                        0,
                        0,
                        outW,
                        outH
                    )
                }

                function saveImage() {

                // ---------- 画布区域视频录制（画面 + 麦克风）----------
                let recordCanvas = null
                let recordCtx = null
                let recordRafId = null
                let recordActive = false
                let mediaRecorder = null
                let recordChunks = []
                let recordMicStream = null
                let recordVideoStream = null

                function ensureRecordCanvas() {
                    if (!recordCanvas) {
                        recordCanvas = document.createElement('canvas')
                        recordCtx = recordCanvas.getContext('2d')
                        recordCanvas.setAttribute('aria-hidden', 'true')
                        Object.assign(recordCanvas.style, {
                            position: 'fixed',
                            left: '0',
                            top: '0',
                            width: '1px',
                            height: '1px',
                            opacity: '0',
                            pointerEvents: 'none',
                            zIndex: '-1',
                        })
                        document.body.appendChild(recordCanvas)
                    }
                }

                /** 优先 MP4（Chrome 126+ 等），否则 WebM */
                function createBestMediaRecorder(stream) {
                    const candidates = [
                        'video/mp4;codecs=avc1.42E01E,mp4a.40.2',
                        'video/mp4;codecs=avc1,mp4a.40.2',
                        'video/mp4;codecs=h264,aac',
                        'video/mp4',
                        'video/webm;codecs=vp9,opus',
                        'video/webm;codecs=vp8,opus',
                        'video/webm',
                    ]
                    for (let i = 0; i < candidates.length; i++) {
                        const mime = candidates[i]
                        if (!MediaRecorder.isTypeSupported(mime)) continue
                        try {
                            return new MediaRecorder(stream, { mimeType: mime })
                        } catch (e) {
                            /* 部分浏览器 isTypeSupported 为真仍无法实例化，试下一项 */
                        }
                    }
                    return new MediaRecorder(stream)
                }

                function extensionFromRecorderMime(mime) {
                    if (!mime || typeof mime !== 'string') return 'webm'
                    const m = mime.toLowerCase()
                    if (m.indexOf('mp4') !== -1) return 'mp4'
                    if (m.indexOf('webm') !== -1) return 'webm'
                    return 'webm'
                }

                function recordFrameLoop() {
                    if (!recordActive || !recordCtx) return
                    const { w, h } = getSceneLayoutCssSize()
                    compositeSceneToContext(recordCtx, w, h)
                    recordRafId = requestAnimationFrame(recordFrameLoop)
                }

                function stopTracks(stream) {
                    if (!stream) return
                    stream.getTracks().forEach(function (t) {
                        t.stop()
                    })
                }

                function finishSceneRecordingDownload() {
                    const mimeType = mediaRecorder
                        ? mediaRecorder.mimeType || 'video/mp4'
                        : 'video/mp4'
                    const ext = extensionFromRecorderMime(mimeType)
                    const blob = new Blob(recordChunks, { type: mimeType })
                    recordChunks = []
                    const url = URL.createObjectURL(blob)
                    const a = document.createElement('a')
                    a.href = url
                    a.download =
                        '小人国录制_' +
                        new Date()
                            .toISOString()
                            .slice(0, 19)
                            .replace(/[:-]/g, '') +
                        '.' +
                        ext
                    a.click()
                    setTimeout(function () {
                        URL.revokeObjectURL(url)
                    }, 2000)
                }

                function stopSceneRecording() {
                    recordActive = false
                    if (recordRafId != null) {
                        cancelAnimationFrame(recordRafId)
                        recordRafId = null
                    }
                    const btn = document.getElementById('recordBtnHeader')
                    if (btn) {
                        btn.classList.remove('recording')
                        btn.title = '视频录制'
                        const icon = btn.querySelector('i')
                        if (icon) {
                            icon.className = 'fas fa-video'
                        }
                    }
                    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                        try {
                            if (typeof mediaRecorder.requestData === 'function')
                                mediaRecorder.requestData()
                            mediaRecorder.stop()
                        } catch (e) {
                            console.warn(e)
                            stopTracks(recordMicStream)
                            stopTracks(recordVideoStream)
                            recordMicStream = recordVideoStream = null
                            mediaRecorder = null
                        }
                    } else {
                        stopTracks(recordMicStream)
                        stopTracks(recordVideoStream)
                        recordMicStream = recordVideoStream = null
                        mediaRecorder = null
                    }
                }

                async function startSceneRecording() {
                    if (!window.MediaRecorder) {
                        alert('当前浏览器不支持视频录制（MediaRecorder）。')
                        return
                    }
                    const bufW = bgCanvas.width
                    const bufH = bgCanvas.height
                    if (bufW < 1 || bufH < 1) return

                    let micStream = null
                    try {
                        micStream = await navigator.mediaDevices.getUserMedia({
                            audio: true,
                            video: false,
                        })
                    } catch (e) {
                        alert(
                            '无法使用麦克风，请允许权限后重试。错误：' +
                                (e && e.message ? e.message : String(e))
                        )
                        return
                    }

                    ensureRecordCanvas()
                    const { w: rw, h: rh } = getSceneLayoutCssSize()
                    recordCanvas.width = rw
                    recordCanvas.height = rh
                    compositeSceneToContext(recordCtx, rw, rh)

                    let videoStream = null
                    try {
                        videoStream = recordCanvas.captureStream(30)
                    } catch (e) {
                        stopTracks(micStream)
                        alert(
                            '无法从画布捕获视频流。错误：' +
                                (e && e.message ? e.message : String(e))
                        )
                        return
                    }

                    const out = new MediaStream()
                    videoStream.getVideoTracks().forEach(function (t) {
                        out.addTrack(t)
                    })
                    micStream.getAudioTracks().forEach(function (t) {
                        out.addTrack(t)
                    })

                    let recorder = null
                    try {
                        recorder = createBestMediaRecorder(out)
                    } catch (e) {
                        stopTracks(micStream)
                        stopTracks(videoStream)
                        alert(
                            '无法创建录制器。错误：' +
                                (e && e.message ? e.message : String(e))
                        )
                        return
                    }

                    recordChunks = []
                    recordMicStream = micStream
                    recordVideoStream = videoStream
                    mediaRecorder = recorder

                    mediaRecorder.ondataavailable = function (e) {
                        if (e.data && e.data.size > 0) recordChunks.push(e.data)
                    }
                    mediaRecorder.onstop = function () {
                        finishSceneRecordingDownload()
                        stopTracks(recordMicStream)
                        stopTracks(recordVideoStream)
                        recordMicStream = recordVideoStream = null
                        mediaRecorder = null
                    }

                    try {
                        mediaRecorder.start(250)
                    } catch (e) {
                        stopTracks(micStream)
                        stopTracks(videoStream)
                        mediaRecorder = null
                        alert(
                            '开始录制失败：' +
                                (e && e.message ? e.message : String(e))
                        )
                        return
                    }

                    recordActive = true
                    const btn = document.getElementById('recordBtnHeader')
                    if (btn) {
                        btn.classList.add('recording')
                        btn.title = '结束录制并下载'
                        const icon = btn.querySelector('i')
                        if (icon) icon.className = 'fas fa-stop'
                    }
                    recordFrameLoop()
                }

                function toggleSceneRecording() {
                    if (recordActive) {
                        stopSceneRecording()
                    } else {
                        startSceneRecording()
                    }
                }

                // ============ 物品配置（支持多个变体）============
                const itemsConfig = {
                    food: {
