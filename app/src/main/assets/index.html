                // 存储分类展开状态（与 itemsConfig 同步，默认全部展开）
                const categoryExpanded = Object.fromEntries(
                    Object.keys(itemsConfig).map((k) => [k, true])
                )

                const thumbImageCache = Object.create(null)
                let thumbLoadsActive = 0
                const THUMB_LOAD_MAX = 12
                const thumbLoadWaiters = []
                let sidebarThumbObserver = null

                function drainThumbLoadQueue() {
                    while (
                        thumbLoadsActive < THUMB_LOAD_MAX &&
                        thumbLoadWaiters.length
                    ) {
                        thumbLoadWaiters.shift()()
                    }
                }

                function loadThumbImage(url) {
                    if (thumbImageCache[url]) return thumbImageCache[url]
                    thumbImageCache[url] = new Promise(function (
                        resolve,
                        reject
                    ) {
                        function start() {
                            thumbLoadsActive++
                            const image = new Image()
                            image.decoding = 'async'
                            image.onload = function () {
                                thumbLoadsActive--
                                drainThumbLoadQueue()
                                resolve(image)
                            }
                            image.onerror = function () {
                                thumbLoadsActive--
                                drainThumbLoadQueue()
                                reject(new Error('thumb load failed'))
                            }
                            image.src = url
                        }
                        if (thumbLoadsActive < THUMB_LOAD_MAX) start()
                        else thumbLoadWaiters.push(start)
                    })
                    return thumbImageCache[url]
                }

                function applyThumbToImg(img, url) {
                    loadThumbImage(url)
                        .then(function () {
                            if (img.isConnected) img.src = url
                        })
                        .catch(function () {
                            if (img.isConnected) img.src = url
                        })
                }

                function observeSidebarThumb(img) {
                    const url = img.getAttribute('data-thumb')
                    if (!url) return
                    if (!sidebarThumbObserver) {
                        const root = document.querySelector('.toolbar-left')
                        sidebarThumbObserver = new IntersectionObserver(
                            function (entries) {
                                entries.forEach(function (entry) {
                                    if (!entry.isIntersecting) return
                                    const el = entry.target
                                    sidebarThumbObserver.unobserve(el)
                                    const u = el.getAttribute('data-thumb')
                                    if (!u) return
                                    el.removeAttribute('data-thumb')
                                    applyThumbToImg(el, u)
                                })
                            },
                            {
                                root: root,
                                rootMargin: '120px 0px',
                                threshold: 0.01,
                            }
                        )
                    }
                    sidebarThumbObserver.observe(img)
                }

                function hydrateCategoryThumbs(itemsEl) {
                    if (!itemsEl) return
                    itemsEl
                        .querySelectorAll('img[data-thumb]')
                        .forEach(observeSidebarThumb)
                }

                function hydrateVariantThumbs(container) {
                    if (!container) return
                    container
                        .querySelectorAll('img[data-thumb]')
                        .forEach(function (img) {
                            const u = img.getAttribute('data-thumb')
                            if (!u) return
                            img.removeAttribute('data-thumb')
                            applyThumbToImg(img, u)
                        })
                }

                function renderItemsPanel() {
                    const container = document.getElementById('itemsContainer')
                    if (!container) return
                    container.innerHTML = ''

                    for (const [category, data] of Object.entries(
                        itemsConfig
                    )) {
                        const categoryDiv = document.createElement('div')
                        categoryDiv.className = 'category'

                        const expanded = categoryExpanded[category]
                        const titleDiv = document.createElement('div')
                        titleDiv.className =
                            'category-title' + (expanded ? ' expanded' : '')
                        titleDiv.innerHTML = `<i class="fas ${data.icon}"></i> ${data.name}<i class="fas fa-chevron-down collapse-icon"></i>`
                        titleDiv.dataset.category = category

                        // 点击分类标题展开/收起
                        titleDiv.addEventListener('click', (e) => {
                            e.stopPropagation()
                            toggleCategory(category, titleDiv, itemsDiv)
                        })

                        categoryDiv.appendChild(titleDiv)

                        const itemsDiv = document.createElement('div')
                        itemsDiv.className =
                            'category-items' + (expanded ? ' show' : '')
                        itemsDiv.id = `cat-${category}`

                        // 渲染物品按钮
                        for (const [type, itemData] of Object.entries(
                            data.items
                        )) {
                            const btn = document.createElement('button')
                            btn.className = 'mat-btn'
                            btn.dataset.type = type
                            btn.dataset.category = category
                            btn.title = itemData.name
                            btn.innerHTML = `<img src="${THUMB_PLACEHOLDER}" data-thumb="${itemData.variants[0].img}" alt="${itemData.name}" width="48" height="48" decoding="async">`

                            // 点击展开变体选择
                            btn.addEventListener('click', (e) => {
                                e.stopPropagation()
                                disableBrushAndEraser()
                                closeAllDropdowns()
                                toggleVariants(category, type)
                            })

                            itemsDiv.appendChild(btn)
                        }

                        categoryDiv.appendChild(itemsDiv)
                        container.appendChild(categoryDiv)
                        if (expanded) hydrateCategoryThumbs(itemsDiv)
                    }
                }

                // 展开/收起分类
                function toggleCategory(category, titleEl, itemsEl) {
                    categoryExpanded[category] = !categoryExpanded[category]
                    const on = categoryExpanded[category]
                    if (titleEl && itemsEl) {
                        titleEl.classList.toggle('expanded', on)
                        itemsEl.classList.toggle('show', on)
                        if (on)
                            requestAnimationFrame(function () {
                                hydrateCategoryThumbs(itemsEl)
                            })
                    }
                }

                // 当前展开的变体
                let expandedVariant = null

                // 展开/收起变体选择
                function toggleVariants(category, type) {
                    const itemsData = itemsConfig[category]?.items[type]
                    if (!itemsData || itemsData.variants.length <= 1) {
                        // 只有一个变体，直接添加
                        addItemToCanvas(category, type, 0)
                        return
                    }

                    // 如果已展开同一物品，则收起
                    if (
                        expandedVariant &&
                        expandedVariant.category === category &&
                        expandedVariant.type === type
                    ) {
                        hideVariants()
                        return
                    }

                    showVariants(category, type, itemsData)
                }

                // 显示变体选择
                function showVariants(category, type, itemsData) {
                    hideVariants()

                    // 创建变体选择面板
                    const panel = document.createElement('div')
                    panel.className = 'variants-panel'
                    panel.id = 'variantsPanel'

                    const title = document.createElement('div')
                    title.className = 'variants-title'
                    title.textContent = itemsData.name
                    panel.appendChild(title)

                    const grid = document.createElement('div')
                    grid.className = 'variants-grid'

                    itemsData.variants.forEach((variant, index) => {
                        const btn = document.createElement('button')
                        btn.className = 'variant-btn'
                        btn.innerHTML = `<img src="${THUMB_PLACEHOLDER}" data-thumb="${variant.img}" alt="${variant.alt}" width="48" height="48" decoding="async">`
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation()
                            addItemToCanvas(category, type, index)
                            hideVariants()
                        })
                        grid.appendChild(btn)
                    })

                    panel.appendChild(grid)
                    document.body.appendChild(panel)
                    hydrateVariantThumbs(panel)

                    // 定位在点击的物品按钮旁边（带边界检测）
                    const btn = document.querySelector(
                        `.mat-btn[data-type="${type}"]`
                    )
                    if (btn) {
                        const rect = btn.getBoundingClientRect()
                        const panelWidth = 220 // 面板宽度
                        const panelHeight = 250 // 面板高度估算

                        let left = rect.left
                        let top = rect.bottom + 5

                        // 右边界检测
                        if (left + panelWidth > window.innerWidth) {
                            left = window.innerWidth - panelWidth - 10
                        }
                        // 左边界检测
                        if (left < 10) left = 10

                        // 下边界检测
                        if (top + panelHeight > window.innerHeight) {
                            top = rect.top - panelHeight - 5 // 显示在按钮上方
                        }

                        panel.style.left = `${left}px`
                        panel.style.top = `${top}px`
                    }

                    expandedVariant = { category, type, panel }

                    // 点击其他地方收起
                    setTimeout(() => {
                        document.addEventListener(
                            'click',
                            hideVariantsOnClickOutside
                        )
                    }, 10)
                }

                // 隐藏变体选择
                function hideVariants() {
                    const panel = document.getElementById('variantsPanel')
                    if (panel) panel.remove()
                    expandedVariant = null
                    document.removeEventListener(
                        'click',
                        hideVariantsOnClickOutside
                    )
                }

                function hideVariantsOnClickOutside(e) {
                    // 排除所有工具按钮、下拉框和物品选择区域
                    if (
                        !e.target.closest('.variants-panel') &&
                        !e.target.closest('.mat-btn') &&
                        !e.target.closest('.brush-dropdown-content') &&
                        !e.target.closest('#brushBtn') &&
                        !e.target.closest('.sidebar-bg-category') &&
                        !e.target.closest('#eraserBtn') &&
                        !e.target.closest('#undoBtn') &&
                        !e.target.closest('#deleteBtn') &&
                        !e.target.closest('#clearBtn') &&
                        !e.target.closest('#saveBtnHeader') &&
                        !e.target.closest('#recordBtnHeader')
                    ) {
                        hideVariants()
                        closeAllDropdowns()
                    }
                }

                // 添加物品到画布
                function addItemToCanvas(category, type, variantIndex) {
                    closeAllDropdowns()
                    disableBrushAndEraser()
                    const itemsData = itemsConfig[category]?.items[type]
                    if (!itemsData) return

                    const variant = itemsData.variants[variantIndex]
                    if (!variant) return

                    const dragType = type.startsWith('child_') ? 'kid' : type
                    const newItem = createDraggable(
                        dragType,
                        variant.img,
                        variantIndex
                    )
                    const { w, h } = getSceneLayoutCssSize()
                    const pos = clampPosition(newItem, w / 2 - 45, h / 2 - 45)
                    setTransform(newItem, pos.x, pos.y, 1.0, 0)
                    selectElementNoDisable(newItem)
                }
                // ===============================================

                // 自动全屏
                function autoFullscreen() {
                    const elem = document.documentElement
                    if (elem.requestFullscreen) {
                        elem.requestFullscreen().catch(() => {})
                    } else if (elem.webkitRequestFullscreen) {
                        elem.webkitRequestFullscreen()
                    } else if (elem.msRequestFullscreen) {
                        elem.msRequestFullscreen()
                    }
                }

                // 全屏切换

                // 保存作品
                function saveProject() {
                    // 保存画布数据
                    const drawData = drawCanvas.toDataURL('image/png')
                    localStorage.setItem('drawingCanvas', drawData)

                    // 保存背景设置
                    localStorage.setItem('currentBg', currentBg)

                    // 保存物品数据
                    const items = []
                    scene.querySelectorAll('.draggable').forEach((el) => {
                        const img = el.querySelector('img')
                        if (img && img.src) {
                            const { tx, ty, scale, rotate } = getTransform(el)
                            items.push({
                                src: img.src,
                                type: el.dataset.type,
                                tx,
                                ty,
                                scale,
                                rotate,
                            })
                        }
                    })
                    localStorage.setItem('sceneItems', JSON.stringify(items))

                    console.log('作品已保存')
                }

                function bindUI() {
                    // 缩略图在展开分类时分批加载（见 hydrateCategoryThumbs），避免此处一次性预加载阻塞主线程
                    const brushDropdownContent = document.getElementById(
                        'brushDropdownContent'
                    )
                    brushDropdownContent
                        .querySelectorAll('.color-swatch')
                        .forEach((opt) => {
                            opt.addEventListener('click', (e) => {
                                e.stopPropagation()
                                const color = opt.dataset.color
                                if (color) {
                                    brushColor = color
                                    setBrushColor(color)
                                    eraserEnabled = false
                                    drawingEnabled = true
                                    drawCanvas.classList.add('drawing-mode')
                                    document
                                        .getElementById('eraserBtn')
                                        .classList.remove('active')
                                    document
                                        .getElementById('brushBtn')
                                        .classList.add('active')
                                    updateInteractionLock()
                                    updateCursor()
                                    brushDropdownContent.classList.remove(
                                        'show'
                                    )
                                }
                            })
                        })
                    brushDropdownContent
                        .querySelectorAll('.size-btn')
                        .forEach((opt) => {
                            opt.addEventListener('click', (e) => {
                                e.stopPropagation()
                                const size = parseInt(opt.dataset.size)
                                if (size) {
                                    brushSize = size
                                    setBrushSize(size)
                                    updateCursor()
                                    brushDropdownContent.classList.remove(
                                        'show'
                                    )
                                }
                            })
                        })

                    // 下拉框点击事件 - 点击下拉框本身时关闭
                    brushDropdownContent.addEventListener('click', (e) => {
                        // 如果点击的是选项，选项自己的事件处理器会处理
                        // 这里只处理点击下拉框空白区域的情况，让它关闭下拉框
                        if (
                            !e.target.closest('.color-swatch') &&
                            !e.target.closest('.size-btn')
                        ) {
                            e.stopPropagation()
                            brushDropdownContent.classList.remove('show')
                        }
                    })

                    // 画笔按钮点击事件
                    document
                        .getElementById('brushBtn')
                        .addEventListener('click', (e) => {
                            e.stopPropagation()
                            const isOpen =
                                brushDropdownContent.classList.contains('show')
                            closeAllDropdowns()
                            if (!isOpen) {
                                // 激活画笔模式
                                eraserEnabled = false
                                drawingEnabled = true
                                drawCanvas.classList.add('drawing-mode')
                                document
                                    .getElementById('eraserBtn')
                                    .classList.remove('active')
                                document
                                    .getElementById('brushBtn')
                                    .classList.add('active')
                                clearSelection() // 取消物品选择
                                updateInteractionLock()
                                updateCursor()
                                brushDropdownContent.classList.add('show')
                            }
                        })
                    const eraserDropdownContent = document.getElementById(
                        'eraserDropdownContent'
                    )
                    document
                        .getElementById('eraserBtn')
                        .addEventListener('click', (e) => {
                            e.stopPropagation()
                            const isOpen =
                                eraserDropdownContent &&
                                eraserDropdownContent.classList.contains('show')
                            closeAllDropdowns()
                            if (!isOpen) {
                                drawingEnabled = false
                                eraserEnabled = true
                                drawCanvas.classList.add('drawing-mode')
                                document
                                    .getElementById('eraserBtn')
                                    .classList.add('active')
                                document
                                    .getElementById('brushBtn')
                                    .classList.remove('active')
                                clearSelection()
                                updateInteractionLock()
                                updateCursor()
                                eraserDropdownContent.classList.add('show')
                            }
                        })
                    if (eraserDropdownContent) {
                        eraserDropdownContent
                            .querySelectorAll('.eraser-size-btn')
                            .forEach((opt) => {
                                opt.addEventListener('click', (e) => {
                                    e.stopPropagation()
                                    const size = parseInt(opt.dataset.size, 10)
                                    if (size) {
                                        setEraserSize(size)
                                        drawingEnabled = false
                                        eraserEnabled = true
                                        drawCanvas.classList.add('drawing-mode')
                                        document
                                            .getElementById('eraserBtn')
                                            .classList.add('active')
                                        document
                                            .getElementById('brushBtn')
                                            .classList.remove('active')
                                        clearSelection()
                                        updateInteractionLock()
                                        eraserDropdownContent.classList.remove(
                                            'show'
                                        )
                                    }
                                })
                            })
                        eraserDropdownContent.addEventListener('click', (e) => {
                            if (!e.target.closest('.eraser-size-btn')) {
                                e.stopPropagation()
                                eraserDropdownContent.classList.remove('show')
                            }
                        })
                    }
                    const undoBtnEl = document.getElementById('undoBtn')
                    if (undoBtnEl)
                        undoBtnEl.addEventListener('click', undoScene)
                    document
                        .getElementById('saveBtnHeader')
                        .addEventListener('click', saveImage)
                    document
                        .getElementById('recordBtnHeader')
                        .addEventListener('click', function (e) {
                            e.stopPropagation()
                            toggleSceneRecording()
                        })
                    document
                        .getElementById('deleteBtn')
                        .addEventListener('click', deleteSelected)
                    const clearBtnEl = document.getElementById('clearBtn')
                    if (clearBtnEl)
                        clearBtnEl.addEventListener('click', clearScene)

                    // 设置默认背景选中状态
                    setBackground('cream')

                    scene.addEventListener('click', (e) => {
                        if (getItemAtPoint(e.clientX, e.clientY)) return
                        clearSelection()
                        closeAllDropdowns()
                    })
                    drawCanvas.addEventListener('mousedown', startDrawing)
                    drawCanvas.addEventListener('mousemove', draw)
                    drawCanvas.addEventListener('mouseup', stopDrawing)
                    drawCanvas.addEventListener('mouseleave', stopDrawing)
                    drawCanvas.addEventListener('touchstart', startDrawing, {
                        passive: false,
                    })
                    drawCanvas.addEventListener('touchmove', draw, {
                        passive: false,
                    })
                    drawCanvas.addEventListener('touchend', stopDrawing)
                    drawCanvas.addEventListener('touchcancel', stopDrawing)
                    scene.addEventListener('mousemove', moveCursor)
                    scene.addEventListener('touchmove', moveCursor, {
                        passive: false,
                    })
                    scene.addEventListener('mouseenter', () => {
                        if (drawingEnabled || eraserEnabled)
                            cursorDiv.style.display = 'block'
                    })
                    scene.addEventListener(
                        'mouseleave',
                        () => (cursorDiv.style.display = 'none')
                    )

                    const bgCategoryTitle =
                        document.getElementById('bgCategoryTitle')
                    const bgCategoryItems =
                        document.getElementById('bgCategoryItems')
                    if (bgCategoryTitle && bgCategoryItems) {
                        bgCategoryTitle.addEventListener('click', (e) => {
                            e.stopPropagation()
                            const open =
                                !bgCategoryTitle.classList.contains('expanded')
                            bgCategoryTitle.classList.toggle('expanded', open)
                            bgCategoryItems.classList.toggle('show', open)
                        })
                        bgCategoryItems
                            .querySelectorAll('.mat-btn[data-bg]')
                            .forEach((btn) => {
                                btn.addEventListener('click', (e) => {
                                    e.stopPropagation()
                                    const k = btn.dataset.bg
                                    if (k) setBackground(k)
                                })
                            })
                    }
                }

                document.addEventListener('gesturestart', (e) =>
                    e.preventDefault()
                )
                document.addEventListener('gesturechange', (e) =>
                    e.preventDefault()
                )
            })()
        </script>
        <script>
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', function () {
                    navigator.serviceWorker
                        .register('./sw.js')
                        .catch(function () {})
                })
            }
        </script>
    </body>
</html>
