<!DOCTYPE html>
<html lang="zh">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
        />
        <title>小人国奇遇记</title>
        <meta name="application-name" content="小人国奇遇记" />
        <meta name="theme-color" content="#ff69b4" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <link rel="manifest" href="./public/manifest.json" />
        <link rel="icon" href="./public/pwa-icon.svg" type="image/svg+xml" />
        <link rel="apple-touch-icon" href="./public/pwa-icon.svg" />
        <link rel="stylesheet" href="./public/all.min.css" />
        <style>
            * {
                box-sizing: border-box;
                user-select: none;
                -webkit-user-select: none;
                -webkit-tap-highlight-color: transparent;
            }

            /* 参考风格：渐变背景 + 半透明卡片 */
            html,
            body {
                margin: 0;
                height: 100%;
                overflow: hidden;
            }
            body {
                height: 100vh;
                background: linear-gradient(
                    135deg,
                    #fff9e6 0%,
                    #e8f4fd 25%,
                    #fff5f8 50%,
                    #f0f8ff 75%,
                    #fff0e6 100%
                );
                font-family: 'Nunito', 'Segoe UI', sans-serif;
                display: flex;
                flex-direction: column;
                touch-action: pan-y;
                position: relative;
            }

            /* 背景装饰层 */
            body::before {
                content: '';
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="3" fill="%23FFD700" opacity="0.3"/><circle cx="80" cy="30" r="2" fill="%23FF69B4" opacity="0.3"/><circle cx="50" cy="60" r="4" fill="%2387CEEB" opacity="0.2"/><circle cx="90" cy="80" r="2" fill="%23FFD700" opacity="0.3"/><circle cx="10" cy="70" r="3" fill="%23FFB6C1" opacity="0.3"/><polygon points="30,10 33,16 40,16 35,20 37,27 30,23 23,27 25,20 20,16 27,16" fill="%23FFD700" opacity="0.2"/><polygon points="70,50 72,54 77,54 73,57 75,62 70,59 65,62 67,57 63,54 68,54" fill="%23FF69B4" opacity="0.2"/></svg>');
                background-size: 200px 200px;
                pointer-events: none;
                z-index: 0;
                opacity: 0.6;
            }

            /* 顶部标题栏 - 白色半透明卡片 */
            .header {
                background: rgba(255, 255, 255, 0.92);
                color: #ff69b4;
                padding: 8px 20px;
                box-shadow: 0 8px 32px rgba(255, 105, 180, 0.15);
                border-radius: 0 0 24px 24px;
                display: flex;
                align-items: center;
                justify-content: stretch;
                position: relative;
                overflow: visible;
                border: 2px solid rgba(255, 182, 193, 0.5);
                border-top: none;
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                z-index: 100;
                flex-shrink: 0;
                min-height: 52px;
                height: auto;
                flex-wrap: wrap;
                box-sizing: border-box;
            }

            .header-buttons {
                display: flex;
                align-items: center;
                flex-wrap: nowrap;
                justify-content: center;
                width: 100%;
                min-width: 0;
            }
            .header-slot-left,
            .header-slot-right {
                flex: 1 1 0;
                min-width: 0;
                display: flex;
                align-items: center;
            }
            .header-slot-left {
                justify-content: flex-start;
            }
            .header-slot-right {
                justify-content: flex-end;
            }
            .header-slot-left > *,
            .header-slot-right > * {
                margin: 3px;
            }
            .header-tools {
                flex: 0 0 auto;
                display: flex;
                align-items: center;
                flex-wrap: wrap;
                justify-content: center;
                margin: -3px;
            }
            .header-tools > * {
                margin: 3px;
            }

            .header-buttons-inline {
                display: inline-flex;
                align-items: center;
                flex-wrap: wrap;
                justify-content: center;
                vertical-align: middle;
                margin: -3px;
            }
            .header-buttons-inline > * {
                margin: 3px;
            }

            .header-buttons-inline {
                margin-left: 0;
            }

            /* 头部按钮 - 彩色渐变风格 */
            .header-btn {
                border: none;
                border-radius: 50%;
                width: 44px;
                height: 44px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.2s;
                position: relative;
                box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
            }
            .header-btn:hover {
                transform: translateY(-2px);
            }
            .header-btn:active {
                transform: translateY(0);
            }
            .header-btn i {
                font-size: 16px;
                color: white;
            }

            #saveBtnHeader,
            #clearBtn {
                background: linear-gradient(145deg, #74b9ff 0%, #0984e3 100%);
            }
            #saveBtnHeader {
                width: 36px;
                height: 36px;
                box-shadow: 0 2px 8px rgba(9, 132, 227, 0.28);
            }
            #saveBtnHeader i {
                font-size: 14px;
            }
            #recordBtnHeader {
                width: 36px;
                height: 36px;
                background: linear-gradient(145deg, #a29bfe 0%, #6c5ce7 100%);
                box-shadow: 0 2px 8px rgba(108, 92, 231, 0.3);
            }
            #recordBtnHeader i {
                font-size: 14px;
            }
            #recordBtnHeader.recording {
                background: linear-gradient(145deg, #ff7675 0%, #d63031 100%);
                box-shadow: 0 0 0 3px rgba(214, 48, 49, 0.35);
                animation: recordPulse 1.2s ease-in-out infinite;
            }
            @keyframes recordPulse {
                0%,
                100% {
                    transform: translateY(0) scale(1);
                }
                50% {
                    transform: translateY(0) scale(1.05);
                }
            }
            #eraserBtn {
                background: linear-gradient(145deg, #a8d8ff 0%, #74b9ff 100%);
            }
            #deleteBtn {
                background: linear-gradient(145deg, #a8e6cf 0%, #55efc4 100%);
            }
            #clearBtn {
                background: linear-gradient(145deg, #ffb8b8 0%, #ff7675 100%);
            }
            #eraserBtn i,
            #deleteBtn i,
            #clearBtn i,
            #undoBtn i {
                color: white;
                outline: none;
                box-shadow: none;
            }
            #videoBtnHeader {
                background: linear-gradient(145deg, #ff7675 0%, #d63031 100%);
            }

            /* 中间区域 - 物品栏 + 画布 */
            .middle-area {
                flex: 1;
                display: flex;
                padding: 12px;
                min-height: 0;
                position: relative;
                z-index: 1;
            }
            .middle-area > * + * {
                margin-left: 12px;
            }

            /* 左侧物品栏 - 白色半透明卡片风格 */
            .toolbar-left {
                width: 140px;
                min-width: 140px;
                max-width: 140px;
                background: rgba(255, 255, 255, 0.92);
                box-shadow: 0 8px 32px rgba(255, 105, 180, 0.2);
                display: flex;
                flex-direction: column;
                padding: 15px 10px;
                border-radius: 24px;
                border: 2px solid rgba(255, 182, 193, 0.5);
                z-index: 10;
                overflow-y: auto;
                flex-shrink: 0;
                scrollbar-width: none;
                -ms-overflow-style: none;
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
            }
            .toolbar-left > * + * {
                margin-top: 10px;
            }
            .toolbar-left::-webkit-scrollbar {
                display: none;
            }

            .toolbar-left .sidebar-bg-category .mat-btn.active {
                border-color: #0984e3;
                box-shadow: 0 0 0 2px rgba(9, 132, 227, 0.25);
            }
            .sidebar-bg-category .bg-mat-swatch {
                display: block;
                width: 48px;
                height: 48px;
                border-radius: 10px;
                border: 1px solid rgba(0, 0, 0, 0.08);
                box-sizing: border-box;
            }

            .material-panel {
                display: flex;
                flex-direction: column;
            }
            .material-panel > * + * {
                margin-top: 8px;
            }
            .category {
                display: flex;
                flex-direction: column;
            }
            .category > * + * {
                margin-top: 6px;
            }

            /* 分类标题 */
            .category-title {
                font-size: 11px;
                font-weight: 700;
                background: linear-gradient(135deg, #fff 0%, #fff5f8 100%);
                padding: 6px 8px;
                border-radius: 12px;
                text-align: center;
                border: 2px solid #ffd4e5;
                cursor: pointer;
                user-select: none;
                -webkit-user-select: none;
                transition: all 0.2s;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 3px 10px rgba(255, 105, 180, 0.12);
                color: #ff69b4;
            }
            .category-title > * + * {
                margin-left: 4px;
            }
            .category-title:hover {
                background: linear-gradient(135deg, #ffd4e5 0%, #ffe4ee 100%);
                transform: translateY(-1px);
            }
            .category-title.collapsed {
                background: linear-gradient(135deg, #ffd4e5 0%, #ffe4ee 100%);
            }
            .category-title i {
                font-size: 12px;
            }

            /* 物品分类标题 */
            .category-title {
                display: flex;
                align-items: center;
                justify-content: space-between;
                cursor: pointer;
                user-select: none;
                padding: 8px 10px;
                background: linear-gradient(135deg, #ffe4ec 0%, #fff0f5 100%);
                border-radius: 10px;
                margin-bottom: 8px;
                transition: background 0.2s ease, box-shadow 0.2s ease,
                    transform 0.2s ease;
                -webkit-user-select: none;
            }

            .category-title:hover {
                background: linear-gradient(135deg, #ffd6e4 0%, #ffe8f0 100%);
            }

            .category-title i:first-child {
                margin-right: 8px;
            }

            .collapse-icon {
                font-size: 12px;
                transition: transform 0.3s ease;
                color: #e91e63;
            }

            .category-title.expanded .collapse-icon {
                transform: rotate(180deg);
            }

            /* 物品按钮 */
            .category-items {
                display: none;
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
                justify-items: center;
                padding: 5px 0;
                contain: layout style;
            }
            .category-items.show {
                display: grid;
            }

            .mat-btn {
                background: linear-gradient(145deg, #ffffff 0%, #fff8fa 100%);
                border: 2px solid rgba(255, 182, 193, 0.5);
                border-radius: 14px;
                padding: 3px;
                box-shadow: 0 3px 10px rgba(255, 105, 180, 0.12);
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                width: 56px;
                height: 56px;
                transition: transform 0.2s ease, box-shadow 0.2s ease,
                    border-color 0.2s ease;
            }
            .mat-btn img {
                width: 48px;
                height: 48px;
                object-fit: contain;
                border-radius: 10px;
                background: #f5f5f5;
            }
            .mat-btn:hover {
                transform: translateY(-2px) scale(1.05);
                box-shadow: 0 6px 16px rgba(255, 105, 180, 0.2);
                border-color: #ff69b4;
            }

            /* 变体选择面板 */
            .variants-panel {
                position: fixed;
                background: rgba(255, 255, 255, 0.98);
                backdrop-filter: blur(15px);
                -webkit-backdrop-filter: blur(15px);
                border-radius: 16px;
                box-shadow: 0 8px 32px rgba(255, 105, 180, 0.25);
                padding: 12px;
                z-index: 1000;
                min-width: 200px;
                animation: fadeIn 0.2s ease;
            }

            .variants-title {
                font-size: 14px;
                font-weight: 600;
                color: #333;
                margin-bottom: 10px;
                text-align: center;
                padding-bottom: 8px;
                border-bottom: 1px solid rgba(255, 105, 180, 0.2);
            }

            .variants-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }

            .variant-btn {
                width: 60px;
                height: 60px;
                border: 2px solid transparent;
                border-radius: 10px;
                background: #f8f8f8;
                cursor: pointer;
                overflow: hidden;
                transition: all 0.2s ease;
                padding: 4px;
            }

            .variant-btn img {
                width: 100%;
                height: 100%;
                object-fit: contain;
            }

            .variant-btn:hover {
                transform: scale(1.1);
                border-color: #ff69b4;
                box-shadow: 0 4px 12px rgba(255, 105, 180, 0.3);
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(-5px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .mat-btn:active {
                transform: translateY(0) scale(0.98);
            }

            /* 画布区域 */
            .scene-wrapper {
                flex: 1;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 0;
                overflow: visible;
            }
            #scene {
                position: relative;
                width: 100%;
                height: 100%;
                border-radius: 28px;
                background: rgba(255, 255, 255, 0.95);
                box-shadow: 0 10px 40px rgba(255, 105, 180, 0.15),
                    inset 0 0 0 3px rgba(255, 182, 193, 0.3);
                border: 3px solid rgba(255, 182, 193, 0.5);
                overflow: hidden;
                touch-action: none;
                cursor: none;
                backdrop-filter: blur(5px);
                -webkit-backdrop-filter: blur(5px);
            }
            #bgCanvas,
            #drawCanvas {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }
            #bgCanvas {
                z-index: 1;
                pointer-events: none;
            }
            #itemsLayer {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 3;
            }
            #drawCanvas {
                z-index: 4;
                user-select: none;
                -webkit-user-select: none;
            }

            /* 可拖拽物品 */
            .draggable {
                position: absolute;
                display: flex;
                align-items: center;
                justify-content: center;
                width: 300px;
                height: 300px;
                background: transparent;
                border: none;
                transform-origin: center;
                filter: drop-shadow(0 4px 8px rgba(255, 105, 180, 0.2));
                pointer-events: auto;
                z-index: 5;
                touch-action: none;
                will-change: transform; /* 提升触摸性能 */
            }
            .draggable img {
                width: 100%;
                height: 100%;
                object-fit: contain;
                pointer-events: none;
                image-rendering: -webkit-optimize-contrast;
                image-rendering: high-quality;
            }
            /* 儿童：尺寸由 JS 按原图比例设定；避免强 filter / 对比度算法导致发糊 */
            .draggable[data-type='kid'] {
                box-sizing: border-box;
                filter: drop-shadow(0 2px 8px rgba(255, 105, 180, 0.2));
            }
            .draggable[data-type='kid'] img {
                image-rendering: auto;
                -webkit-backface-visibility: hidden;
                backface-visibility: hidden;
            }
            /* 选中描边：drop-shadow 沿子元素（含透明底图）的非透明边缘，而非整块 300×300 矩形 */
            .draggable.selected {
                outline: none;
                filter: drop-shadow(1px 0 0 #ff1493)
                    drop-shadow(-1px 0 0 #ff1493) drop-shadow(0 1px 0 #ff1493)
                    drop-shadow(0 -1px 0 #ff1493) drop-shadow(1px 1px 0 #ff1493)
                    drop-shadow(-1px 1px 0 #ff1493)
                    drop-shadow(1px -1px 0 #ff1493)
                    drop-shadow(-1px -1px 0 #ff1493)
                    drop-shadow(0 4px 8px rgba(255, 105, 180, 0.22));
            }
            .draggable[data-type='kid'].selected {
                filter: drop-shadow(1px 0 0 #ff1493)
                    drop-shadow(-1px 0 0 #ff1493) drop-shadow(0 1px 0 #ff1493)
                    drop-shadow(0 -1px 0 #ff1493) drop-shadow(1px 1px 0 #ff1493)
                    drop-shadow(-1px 1px 0 #ff1493)
                    drop-shadow(1px -1px 0 #ff1493)
                    drop-shadow(-1px -1px 0 #ff1493)
                    drop-shadow(0 2px 8px rgba(255, 105, 180, 0.22));
            }
            .img-spinner {
                position: absolute;
                top: 50%;
                left: 50%;
                width: 24px;
                height: 24px;
                margin: -12px 0 0 -12px;
                border: 3px solid rgba(255, 182, 193, 0.3);
                border-top-color: #ff69b4;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
                pointer-events: none;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            /* 自定义光标 */
            #customCursor {
                position: fixed;
                pointer-events: none;
                z-index: 1000;
                display: none;
                width: 12px;
                height: 12px;
                background: linear-gradient(145deg, #ff69b4 0%, #ff1493 100%);
                border-radius: 50%;
                border: 2px solid white;
                box-shadow: 0 2px 10px rgba(255, 20, 147, 0.4);
                transform: translate(-50%, -50%);
            }
            #customCursor.eraser-mode {
                width: 24px;
                height: 24px;
                background: linear-gradient(145deg, #fff 0%, #fff5f8 100%);
                border: 3px solid #ffb6c1;
                border-radius: 6px;
            }

            /* 底部工具栏 - 毛玻璃卡片 */
            .bottom-toolbar {
                background: rgba(255, 255, 255, 0.92);
                box-shadow: 0 -8px 32px rgba(255, 105, 180, 0.15);
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 8px 20px;
                border-top: 2px solid rgba(255, 182, 193, 0.5);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                flex-shrink: 0;
                position: relative;
                z-index: 100;
                flex-wrap: wrap;
                height: 60px;
                box-sizing: border-box;
                margin: -6px;
            }
            .bottom-toolbar > * {
                margin: 6px;
            }

            /* 工具按钮 - 清晰图标 */
            .tool-btn {
                background: linear-gradient(145deg, #ffffff 0%, #fff8fa 100%);
                border: none;
                border-radius: 50%;
                padding: 0;
                box-shadow: 0 2px 8px rgba(255, 105, 180, 0.15);
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                width: 44px;
                height: 44px;
                transition: all 0.2s;
                color: #ff69b4;
                font-size: 14px;
            }
            .tool-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 4px 12px rgba(255, 105, 180, 0.25);
                border-color: #ff69b4;
            }
            .tool-btn:active {
                transform: translateY(0);
            }
            .tool-btn.active {
                background: linear-gradient(145deg, #ffb6c1 0%, #ff69b4 100%);
                border-color: #ff69b4;
                box-shadow: 0 4px 12px rgba(255, 105, 180, 0.4);
                color: white;
            }
            .tool-btn.warning {
                background: linear-gradient(145deg, #ffe4ec 0%, #ffd4e5 100%);
                border-color: rgba(255, 182, 193, 0.7);
            }
            .tool-btn i {
                font-size: 22px;
            }
            .tool-btn.disabled {
                opacity: 0.5;
                cursor: not-allowed;
                pointer-events: none;
            }
            .tool-btn.disabled:hover {
                transform: none;
                box-shadow: 0 4px 15px rgba(255, 105, 180, 0.15);
            }

            /* 粗细选择器 */
            .size-selector {
                display: flex;
                align-items: center;
                background: rgba(255, 255, 255, 0.9);
                padding: 4px 8px;
                border-radius: 20px;
                box-shadow: 0 2px 8px rgba(255, 105, 180, 0.1);
                border: 2px solid rgba(255, 182, 193, 0.4);
            }
            .size-selector > * + * {
                margin-left: 4px;
            }
            .size-btn {
                width: 28px;
                height: 28px;
                border-radius: 50%;
                background: linear-gradient(145deg, #fff 0%, #fff5f8 100%);
                border: 2px solid rgba(255, 182, 193, 0.5);
                box-shadow: 0 2px 6px rgba(255, 105, 180, 0.12);
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.2s;
            }
            .size-btn:hover {
                transform: scale(1.1);
            }
            .size-btn.active {
                background: linear-gradient(145deg, #ffb6c1 0%, #ff69b4 100%);
                border-color: #ff69b4;
                box-shadow: 0 3px 10px rgba(255, 105, 180, 0.4);
            }
            .size-dot {
                background: #e91e63;
                border-radius: 50%;
            }

            /* 画笔下拉菜单 */
            .brush-dropdown {
                position: relative;
            }
            .brush-dropdown .dropdown-arrow {
                font-size: 8px;
                margin-left: 2px;
            }
            .brush-dropdown-content {
                display: none;
                position: absolute;
                top: 100%;
                left: 50%;
                transform: translateX(-50%);
                background: white;
                border-radius: 16px;
                padding: 12px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
                z-index: 1000;
                min-width: 200px;
            }
            .brush-dropdown-content.show,
            .brush-dropdown-content.show {
                display: block;
            }

            .dropdown-section {
                margin-bottom: 12px;
            }
            .dropdown-section:last-child {
                margin-bottom: 0;
            }
            .dropdown-label {
                font-size: 11px;
                color: #888;
                margin-bottom: 8px;
                font-weight: 500;
            }
            .color-grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 6px;
            }
            .color-swatch {
                width: 36px;
                height: 36px;
                border-radius: 8px;
                cursor: pointer;
                transition: all 0.2s;
                border: 2px solid transparent;
            }
            .color-swatch:hover {
                transform: scale(1.1);
            }
            .color-swatch.active {
                border-color: #ff69b4;
                box-shadow: 0 0 0 2px white, 0 0 0 4px #ff69b4;
            }
            .size-options {
                display: flex;
                align-items: center;
                justify-content: center;
            }
